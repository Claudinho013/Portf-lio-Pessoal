<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#F50057"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <!-- Bracket left -->
  <text x="8" y="72" font-size="54" fill="rgba(255,255,255,0.55)" font-family="'Courier New',monospace" font-weight="700">&lt;</text>
  <!-- CS letters -->
  <text x="50" y="67" font-size="36" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-weight="900" letter-spacing="-1">CS</text>
  <!-- Bracket right -->
  <text x="62" y="72" font-size="54" fill="rgba(255,255,255,0.55)" font-family="'Courier New',monospace" font-weight="700">/&gt;</text>
</svg>
